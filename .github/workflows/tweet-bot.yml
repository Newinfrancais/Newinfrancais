name: Bot Actu Twitter

on:
  schedule:
    - cron: '*/20 * * * *'
  workflow_dispatch:

jobs:
  post-news:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout du repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Installer Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}

      - name: Installer les dépendances
        run: pip install -r requirements.txt

      - name: Exécuter le bot
        env:
          OPENTWEET_API_KEY: ${{ secrets.OPENTWEET_API_KEY }}
          OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
        run: python bot.py

      - name: Sauvegarder l'état anti-doublon
        run: |
          git config --local user.email "bot@github-actions"
          git config --local user.name "Actu Bot"
          git add data/seen_articles.json
          git diff --staged --quiet || git commit -m "🔄 Mise à jour articles publiés [skip ci]"
          git push
